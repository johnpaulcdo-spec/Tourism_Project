name: Tourism Project Pipeline

on: push: branches: - main # Automatically triggers on push to the main branch

jobs:

register-dataset: runs-on: ubuntu-latest steps: - uses: actions/checkout@v3 - name: Install Dependencies run: pip install -r requirements.txt - name: Upload Dataset to Hugging Face Hub env: HF_TOKEN: ${{ secrets.HF_TOKEN }} run: python Tourism_project/scripts/register_dataset.py

data-prep: needs: register-dataset runs-on: ubuntu-latest steps: - uses: actions/checkout@v3 - name: Install Dependencies run: pip install -r requirements.txt - name: Run Data Preparation env: HF_TOKEN: ${{ secrets.HF_TOKEN }} run: python Tourism_project/scripts/prep.py

model-training: needs: data-prep runs-on: ubuntu-latest steps: - uses: actions/checkout@v3 - name: Install Dependencies run: pip install -r requirements.txt - name: Start MLflow Server run: | nohup mlflow ui --host 0.0.0.0 --port 5000 & # Run MLflow UI in the background sleep 5 # Wait for a moment to let the server start - name: Model Building env: HF_TOKEN: ${{ secrets.HF_TOKEN }} run: python Tourism_project/scripts/train.py

deploy-hosting: runs-on: ubuntu-latest needs: [model-training, data-prep, register-dataset] steps: - uses: actions/checkout@v3 - name: Install Dependencies run: pip install -r requirements.txt - name: Push files to Frontend Hugging Face Space env: HF_TOKEN: ${{ secrets.HF_TOKEN }} run: python Tourism_project/hosting/hosting.py
jobs:
  model-training:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Training Script
        run: python train.py
